<svg width="220" height="140" viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a5fd4" />
            <stop offset="100%" style="stop-color:#3a8ef6" />
        </linearGradient>
        <linearGradient id="pg" x1="10%" y1="0%" x2="90%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff" />
            <stop offset="100%" style="stop-color:#e8eef8" />
        </linearGradient>
        <linearGradient id="fd" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c5d5ee" />
            <stop offset="100%" style="stop-color:#a0b8de" />
        </linearGradient>
        <linearGradient id="ln" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#6aabee" />
            <stop offset="100%" style="stop-color:#9cc8f8" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="220" height="140" rx="16" fill="url(#bgH)" />

    <!-- Icon tile: 72×72, centered vertically, left-padded 20px -->
    <!-- tile: x=20, y=(140-72)/2=34 -->
    <rect x="12" y="34" width="72" height="72" rx="16" fill="white" fill-opacity="0.15" />

    <!-- Doc: 36w 44h, centered in tile: x=20+(72-36)/2=38, y=34+(72-44)/2=48 -->
    <rect x="30" y="48" width="36" height="44" rx="3" fill="url(#pg)" />

    <!-- Fold: starts at x=38+24=62, corner=(74,48) -->
    <polygon points="54,48 66,48 66,60" fill="url(#fd)" />
    <polygon points="54,48 66,60 54,60" fill="white" fill-opacity="0.55" />
    <line x1="54" y1="48" x2="54" y2="60" stroke="#b0c4de" stroke-width="0.7" />
    <line x1="54" y1="60" x2="66" y2="60" stroke="#b0c4de" stroke-width="0.7" />

    <!-- 3 lines -->
    <rect x="34" y="67" width="22" height="3" rx="1.5" fill="url(#ln)" />
    <rect x="34" y="74" width="26" height="3" rx="1.5" fill="url(#ln)" />
    <rect x="34" y="81" width="17" height="3" rx="1.5" fill="url(#ln)" />

    <!-- TL bracket: corner=(38,48), arm=10 -->
    <path d="M30,58 L30,48 L40,48" fill="none" stroke="url(#ln)" stroke-width="3" stroke-linecap="round"
        stroke-linejoin="round" />

    <!-- BR bracket: doc right=74, doc bottom=92, arm=10 -->
    <path d="M66,82 L66,92 L56,92" fill="none" stroke="url(#ln)" stroke-width="3" stroke-linecap="round"
        stroke-linejoin="round" />

    <!-- Text: x=108, right edge=204 (16px padding) -->
    <!-- Block: title(20) + 6 + sub(13) + 8 + divider + 8 + tagline(12) = 67px -->
    <!-- start y = (140-67)/2 = 37, title baseline = 37+18 = 55 -->
    <text x="103" y="48" font-family="Google Sans, Roboto, sans-serif" font-size="19" font-weight="700"
        fill="white">Size Matters</text>
    <text x="103" y="65" font-family="Roboto, sans-serif" font-size="11.5" fill="white" fill-opacity="0.88">Custom page
        sizes</text>
    <text x="103" y="79" font-family="Roboto, sans-serif" font-size="11.5" fill="white" fill-opacity="0.88">for Google
        Docs</text>
    <line x1="103" y1="89" x2="208" y2="89" stroke="white" stroke-opacity="0.4" stroke-width="0.8" />
    <text x="103" y="105" font-family="Roboto, sans-serif" font-size="10.5" fill="white" fill-opacity="0.72">Free · No
        subscription</text>
</svg>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3a8ef6" />
            <stop offset="100%" style="stop-color:#1a5fd4" />
        </linearGradient>
        <linearGradient id="pg" x1="10%" y1="0%" x2="90%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff" />
            <stop offset="100%" style="stop-color:#e8eef8" />
        </linearGradient>
        <linearGradient id="fd" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c5d5ee" />
            <stop offset="100%" style="stop-color:#a0b8de" />
        </linearGradient>
        <linearGradient id="ln" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#6aabee" />
            <stop offset="100%" style="stop-color:#9cc8f8" />
        </linearGradient>
    </defs>

    <!-- Background tile -->
    <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#bg)" />

    <!-- Doc: 16w 22h, centered: x=(32-16)/2=8, y=(32-22)/2=5 -->
    <rect x="8" y="5" width="16" height="22" rx="1.5" fill="url(#pg)" />

    <!-- Fold: starts at x=8+10=18, corner=(24,5) -->
    <polygon points="18,5 24,5 24,11" fill="url(#fd)" />
    <polygon points="18,5 24,11 18,11" fill="white" fill-opacity="0.5" />
    <line x1="18" y1="5" x2="18" y2="11" stroke="#b0c4de" stroke-width="0.4" />
    <line x1="17.8" y1="11" x2="24" y2="11" stroke="#b0c4de" stroke-width="0.4" />

    <!-- 3 lines -->
    <rect x="10" y="15" width="8" height="1.5" rx="0.75" fill="url(#ln)" />
    <rect x="10" y="19" width="10" height="1.5" rx="0.75" fill="url(#ln)" />
    <rect x="10" y="23" width="6" height="1.5" rx="0.75" fill="url(#ln)" />

    <!-- TL bracket: corner=(8,5), arm=5 -->
    <path d="M8,10 L8,5 L13,5" fill="none" stroke="url(#ln)" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round" />

    <!-- BR bracket: doc right=24, doc bottom=27, arm=5 -->
    <path d="M24,22 L24,27 L19,27" fill="none" stroke="url(#ln)" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round" />
</svg>
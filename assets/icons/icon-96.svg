<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a8ef6"/>
      <stop offset="100%" style="stop-color:#1a5fd4"/>
    </linearGradient>
    <linearGradient id="pg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8eef8"/>
    </linearGradient>
    <linearGradient id="fd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5d5ee"/>
      <stop offset="100%" style="stop-color:#a0b8de"/>
    </linearGradient>
    <linearGradient id="ln" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6aabee"/>
      <stop offset="100%" style="stop-color:#9cc8f8"/>
    </linearGradient>
  </defs>

  <!-- Background tile: 96×96, rx scales from 128→96: 28*(96/128)=21 -->
  <rect x="0" y="0" width="96" height="96" rx="21" fill="url(#bg)"/>

  <!-- Doc: 54w 67h, centered: x=(96-54)/2=21, y=(96-67)/2=14.5≈15 -->
  <rect x="21" y="15" width="54" height="67" rx="4" fill="url(#pg)"/>

  <!-- Fold: starts at x=21+36=57, corner=(75,15) -->
  <polygon points="57,15 75,15 75,33" fill="url(#fd)"/>
  <polygon points="57,15 75,33 57,33" fill="white" fill-opacity="0.5"/>
  <line x1="57" y1="15" x2="57" y2="33" stroke="#b0c4de" stroke-width="0.7"/>
  <line x1="57" y1="33" x2="75" y2="33" stroke="#b0c4de" stroke-width="0.7"/>

  <!-- 3 lines -->
  <rect x="29" y="48" width="36" height="4" rx="2" fill="url(#ln)"/>
  <rect x="29" y="59" width="42" height="4" rx="2" fill="url(#ln)"/>
  <rect x="29" y="70" width="29" height="4" rx="2" fill="url(#ln)"/>

  <!-- TL bracket: corner=(21,15), arm=15 -->
  <path d="M21,30 L21,15 L36,15" fill="none" stroke="url(#ln)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BR bracket: doc right=75, doc bottom=82, arm=15 -->
  <path d="M75,67 L75,82 L60,82" fill="none" stroke="url(#ln)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>